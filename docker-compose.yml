name: paris

x-obs-controller-app-common: &obs-controller-app-common
  build:
    context: ./apps/obs-controller
    dockerfile: Dockerfile
    args:
      VITE_APP_NAME: ${OBS_VITE_APP_NAME}
      VITE_REVERB_APP_KEY: ${OBS_VITE_REVERB_APP_KEY}
      VITE_REVERB_HOST: ${OBS_VITE_REVERB_HOST}
      VITE_REVERB_PORT: ${OBS_VITE_REVERB_PORT}
      VITE_REVERB_SCHEME: ${OBS_VITE_REVERB_SCHEME}
  working_dir: /var/www/html
  env_file:
    - path: ./apps/obs-controller/.env
      required: false
  environment:
    RUN_MIGRATIONS: "false"
  volumes:
    - ./apps/obs-controller/storage:/var/www/html/storage
    - ./apps/obs-controller/database:/var/www/html/database
  networks:
    - app-network
  restart: unless-stopped

