  workflows-worker:
    <<: *workflows-common
    container_name: workflows-worker
    depends_on:
      temporal-create-namespace:
        condition: service_completed_successfully
      app-web:
        condition: service_healthy
    environment:
      FACT_CHECK_POST_URL: ${FACT_CHECK_POST_URL:-http://app-web:8000/api/stream/fact-check}
    command: [ "python", "workflows/debate_worker.py", "--address", "temporal:7233" ]

  workflows-launcher:
    <<: *workflows-common
    depends_on:
      temporal:
        condition: service_healthy
    restart: "no"
    stdin_open: true
    tty: false
    command: [ "python", "workflows/debate_jsonl_to_temporal.py", "--address", "temporal:7233", "--input-jsonl", "-" ]

networks:
  app-network:
    driver: bridge
    name: app-network
  temporal-network:
    driver: bridge
    name: temporal-network
